function biomeAt(px, biomes) {
  const list = biomes || BIOMES1;
  const col = Math.floor(px / TILE);
  return list.find((b) => col <= b.end) || list[list.length - 1];
}
function biomeAtRow(py, biomes) {
  const row = Math.floor(py / TILE);
  return biomes.find((b) => row <= b.end) || biomes[biomes.length - 1];
}
function zoneFor(world, px, py) {
  return world.zoneAxis === "row" ? biomeAtRow(py, world.biomes) : biomeAt(px, world.biomes);
}

function emptyGrid(w, h) { return Array.from({ length: h }, () => Array.from({ length: w }, () => ".")); }
function setPx(g, c, r, ch) { if (r >= 0 && r < g.length && c >= 0 && c < g[0].length) g[r][c] = ch; }
function buildBlob(w, h, rx, ry, body, dark, hi) {
  const g = emptyGrid(w, h);
  const cx = (w - 1) / 2, cy = (h - 1) / 2;
  for (let r = 0; r < h; r++)
    for (let c = 0; c < w; c++) {
      const dx = (c - cx) / rx, dy = (r - cy) / ry, d = dx * dx + dy * dy;
      if (d <= 1) {
        let ch = body;
        if (dy > 0.30) ch = dark;
        if (dx < -0.05 && dy < -0.05 && d < 0.55) ch = hi;
        g[r][c] = ch;
      }
    }
  for (let r = 0; r < h; r++)
    for (let c = 0; c < w; c++) {
      if (g[r][c] === ".") continue;
      const nb = [[c - 1, r], [c + 1, r], [c, r - 1], [c, r + 1]];
      if (nb.some(([nc, nr]) => nc < 0 || nr < 0 || nc >= w || nr >= h || g[nr][nc] === ".")) {
      
      }
    }
  const out = g.map((row) => row.slice());
  for (let r = 0; r < h; r++)
    for (let c = 0; c < w; c++) {
      if (g[r][c] === ".") continue;
      const nb = [[c - 1, r], [c + 1, r], [c, r - 1], [c, r + 1]];
      if (nb.some(([nc, nr]) => nc < 0 || nr < 0 || nc >= w || nr >= h || g[nr][nc] === ".")) out[r][c] = "O";
    }
  return out;
}
function makeSprite(grid, pal) {
  const h = grid.length, w = grid[0].length;
  const cv = document.createElement("canvas");
  cv.width = w; cv.height = h;
  const x = cv.getContext("2d");
  for (let r = 0; r < h; r++)
    for (let c = 0; c < w; c++) {
      const ch = grid[r][c];
      if (ch === ".") continue;
      x.fillStyle = pal[ch] || "#f0f";
      x.fillRect(c, r, 1, 1);
    }
  return { cv, w, h };
}
function drawSprite(ctx, spr, x, y, flip, sx = 1, sy = 1) {
  const w = spr.w, h = spr.h, dw = w * sx, dh = h * sy;
  const ox = Math.round(x + (w - dw) / 2);
  const oy = Math.round(y + (h - dh)); 
  ctx.save();
  if (flip) { ctx.translate(ox + dw, oy); ctx.scale(-1, 1); ctx.drawImage(spr.cv, 0, 0, dw, dh); }
  else ctx.drawImage(spr.cv, ox, oy, dw, dh);
  ctx.restore();
}


const PATHO_PAL = {

function pathoFrame(spikePhase, foot, blink) {
  const g = buildBlob(15, 14, 6.6, 5.7, "b", "d", "h");

  setPx(g, 4, 2, "H"); setPx(g, 5, 2, "H"); setPx(g, 3, 3, "H");

  const spikes = [[7, 0], [4, 1], [10, 1], [1, 5], [13, 5], [2, 9], [12, 9], [7, 13]];
  spikes.forEach(([c, r], i) => { if ((i + spikePhase) % 2 === 0) { setPx(g, c, r, "c"); } });

  if (blink) { [[4, 6], [5, 6], [9, 6], [10, 6]].forEach(([c, r]) => setPx(g, c, r, "O")); }
  else {
    [[4, 5], [5, 5], [4, 6], [5, 6]].forEach(([c, r]) => setPx(g, c, r, "e"));
    [[9, 5], [10, 5], [9, 6], [10, 6]].forEach(([c, r]) => setPx(g, c, r, "e"));
    setPx(g, 5, 6, "p"); setPx(g, 10, 6, "p");
    setPx(g, 4, 5, "s"); setPx(g, 9, 5, "s");
  }

  setPx(g, 6, 9, "m"); setPx(g, 7, 9, "m"); setPx(g, 8, 9, "m"); setPx(g, 5, 8, "m"); setPx(g, 9, 8, "m");

  if (foot === 0) { setPx(g, 5, 13, "O"); setPx(g, 9, 13, "O"); }

  else { setPx(g, 6, 13, "O"); setPx(g, 10, 13, "O"); }
  return g;
}

const RETIC_PAL = { O: "#5a4470", b: "#cdb8ec", d: "#a48bd4", h: "#ece0ff", e: "#3a2a52", p: "#241a38", n: "#f4eaff" };
function buildStellate(w, h, body, dark, hi, arm) {
  const g = buildBlob(w, h, w * 0.26, h * 0.26, body, dark, hi);
  const cx = (w - 1) / 2, cy = (h - 1) / 2;

  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 + 0.3;
    const len = Math.max(w, h) * 0.62;
    for (let t = 2; t < len; t += 1) {
      const x = Math.round(cx + Math.cos(a) * t), y = Math.round(cy + Math.sin(a) * t * 0.92);
      setPx(g, x, y, arm);
      if (t % 3 === 0) setPx(g, x + (Math.cos(a) >= 0 ? 1 : -1), y, arm);
    }
  }
  return g;
}
function reticularGrid() {
  const g = buildStellate(20, 18, "b", "d", "h", "O");
  const cx = 9, cy = 8;
  setPx(g, cx, cy, "e"); setPx(g, cx + 1, cy, "e"); setPx(g, cx, cy + 1, "e");
  setPx(g, cx - 1, cy - 1, "n"); setPx(g, cx + 2, cy - 1, "n");
  return g;
}

function heartPath(ctx, cx, cy, s) {
  ctx.beginPath();
  ctx.moveTo(cx, cy + s * 0.3);
  ctx.bezierCurveTo(cx - s, cy - s * 0.4, cx - s * 0.55, cy - s, cx, cy - s * 0.45);
  ctx.bezierCurveTo(cx + s * 0.55, cy - s, cx + s, cy - s * 0.4, cx, cy + s * 0.3);
  ctx.closePath();
}

function drawGlow(ctx, x, y, r, color, a) {
  ctx.save();
  ctx.globalAlpha = a;
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, color); g.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

  ctx.beginPath();
  const dir = -facing;
  for (let i = 0; i <= 8; i++) {
    const px = x + dir * i;
    const py = y + Math.sin(t * 8 + i * 0.8) * (i * 0.35);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.stroke();
}

  ctx.lineWidth = 1; ctx.strokeStyle = "#3a2f52";
  ctx.beginPath(); ctx.ellipse(0, 0, r, r * 0.85, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = "#6b4f8f";

}

function isSolid(world, c, r) {
  if (world.solid.has(c * 1000 + r)) return true;
  const g = world.gate;

}

            <div style={{ fontSize: 24, marginTop: 16, color: "#e89aa6", textShadow: "0 4px 0 #7a2c3c" }}>THE SPLEEN</div>
            <div style={{ fontFamily: "'VT323', monospace", fontSize: 22, marginTop: 22, lineHeight: 1.5, color: "#e8c0cf", maxWidth: 480 }}>
              Out of the efferent lymphatic and into the splenic artery, you arrive in white pulp - a B-cell follicle beside the T-cell PALS, wrapped around a central arteriole.<br /><br />
              Below: the marginal zone, then red pulp's cords of Billroth - with a fork between an OPEN and a CLOSED circulation route down to the venous sinusoids and the splenic vein.<br /><br />
              Hold ↑/↓ (or W/S) on a shaft to climb between levels. Collect senescent RBCs and deliver them to the red pulp macrophage for recycling.
            </div>
            <button style={bigBtn} onClick={beginNextWorld}>ENTER THE SPLEEN</button>
          </div>
        )}
        {mode === "win" && (
          <div style={overlayWrap}>
            <div style={{ fontSize: 11, color: "#9fe06a", letterSpacing: 3, marginBottom: 6 }}>· pathogen survived ·</div>
            <div style={{ fontSize: 20, color: "#9fe06a", textShadow: "0 4px 0 #2c5a1c" }}>SPLENIC VEIN REACHED</div>
            <div style={{ fontFamily: "'VT323', monospace", fontSize: 22, marginTop: 18, lineHeight: 1.6, color: "#e8c0cf", maxWidth: 480 }}>
              You squeezed through the venous sinusoids and out via the splenic vein — back into systemic circulation. The immune system tried its best.
            </div>
            <div style={{ fontFamily: "'VT323', monospace", fontSize: 20, marginTop: 14, lineHeight: 1.8, color: "#aef0ff" }}>
              ATP gathered: <span style={{ color: "#ffe07a" }}>{stats.atp}</span> / {stats.total}<br />
              Time: <span style={{ color: "#ffe07a" }}>{Math.floor(stats.time / 60) > 0 ? Math.floor(stats.time / 60) + "m " : ""}{stats.time % 60}s</span>
            </div>
            <div style={{ fontFamily: "'VT323', monospace", fontSize: 18, marginTop: 10, color: "rgba(200,180,210,0.7)", maxWidth: 440 }}>
              Bloodstream → lymph node → spleen. One pathogen's tour of adaptive immunity.
            </div>
            <div style={{ display: "flex", gap: 14, flexWrap: "wrap", justifyContent: "center", marginTop: 18 }}>
              <button style={bigBtn} onClick={() => playWorld(stats.worldId)}>PLAY AGAIN</button>
              <button style={ghostBtn} onClick={() => playWorld(1)}>FROM WORLD 1</button>
              <button style={ghostBtn} onClick={() => setModeBoth("worldselect")}>WORLD SELECT</button>
            </div>
          </div>
        )}
        {mode === "lose" && (
          <div style={overlayWrap}>
            <div style={{ fontSize: 10, color: "#e8556a", letterSpacing: 3, marginBottom: 8 }}>· neutralised ·</div>
            <div style={{ fontSize: 16, color: "#e8556a", textShadow: "0 4px 0 #5a1f2a" }}>THE IMMUNE</div>
            <div style={{ fontSize: 16, color: "#e8556a", textShadow: "0 4px 0 #5a1f2a" }}>RESPONSE PREVAILED</div>
            <div style={{ fontFamily: "'VT323', monospace", fontSize: 20, marginTop: 18, lineHeight: 1.9, color: "#e8c0cf", maxWidth: 440 }}>
              Phagocytosed, neutralised, or swept out of bounds.<br />
              ATP gathered: <span style={{ color: "#ffe07a" }}>{stats.atp}</span> / {stats.total}<br />
              Time survived: <span style={{ color: "#ffe07a" }}>{Math.floor(stats.time / 60) > 0 ? Math.floor(stats.time / 60) + "m " : ""}{stats.time % 60}s</span>
            </div>
            <div style={{ display: "flex", gap: 14, flexWrap: "wrap", justifyContent: "center", marginTop: 8 }}>
              <button style={bigBtn} onClick={() => playWorld(stats.worldId)}>TRY AGAIN</button>
              <button style={ghostBtn} onClick={() => setModeBoth("worldselect")}>WORLD SELECT</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MicrobeQuestV2 />);
  </script>
</body>
</html>
